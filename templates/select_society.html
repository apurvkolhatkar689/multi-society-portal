<!doctype html>
<html>
  <head>
    <title>Select Society</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <div
      class="d-flex justify-content-center align-items-center min-vh-100 px-3"
    >
      <div class="login-card">
        <h2>Select Your Society</h2>

        <form action="/login" method="GET">
          <select name="society" required>
            <option value="">-- Select Society --</option>
            <option value="Planet Millennium">Planet Millennium</option>
            <option value="Green Acres">Green Acres</option>
            <option value="Rose Valley">Rose Valley</option>
          </select>

          <button type="submit">Continue</button>
        </form>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
