<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/style.css" />
    <style>
      body {
        min-height: 100vh; /* Changed from height to min-height to support scrolling on smaller screens */
        background: #333333; /* fallback for old browsers */
        background: -webkit-linear-gradient(
          to right,
          #a43931,
          #a2ab58,
          #333333
        ); /* Chrome 10-25, Safari 5.1-6 */
        background: linear-gradient(
          to right,
          #a43931,
          #a2ab58,
          #333333
        ); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

        /* Removed display: flex from here so it doesn't conflict with Bootstrap's grid structure */
      }

      .login-card {
        background: #e0eafc;
      }
    </style>
  </head>
  <body>
    <div
      class="d-flex justify-content-center align-items-center min-vh-100 px-3"
    >
      <div
        class="row g-4 justify-content-center w-100"
        style="max-width: 900px"
      >
        <div class="col-md-6 col-12">
          <div class="login-card" id="resident">
            <h2>{{.Society}}</h2>
            <h3>Resident Login</h3>
            <form>
              <input type="email" placeholder="Enter Email Address" />
              <input type="password" placeholder="Enter Password" />
              <button type="submit">Login</button>
              <div class="register-link">
                New Resident?
                <a href="/registration?society={{.Society}}">Register Here</a>
              </div>
            </form>
          </div>
        </div>

        <div class="col-md-6 col-12">
          <div class="login-card" id="committee">
            <h2>{{.Society}}</h2>
            <h3>Committee Login</h3>
            <form>
              <input type="email" placeholder="Enter Email Address" />
              <input type="password" placeholder="Enter Password" />
              <button type="submit">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
